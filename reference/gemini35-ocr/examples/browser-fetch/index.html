<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browser Fetch Gemini OCR Demo</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      color: #172033;
      background: #f6f8fb;
    }
    main {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0;
    }
    .panel {
      background: #fff;
      border: 1px solid #d9e1ea;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
    }
    label { display: block; font-weight: 700; margin: 8px 0 4px; }
    input, select, textarea, button {
      font: inherit;
      border: 1px solid #c8d2df;
      border-radius: 6px;
      padding: 9px 10px;
    }
    input, select, textarea { width: 100%; }
    textarea { min-height: 130px; }
    button {
      background: #2f6fed;
      color: white;
      border: 0;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    pre {
      white-space: pre-wrap;
      background: #101827;
      color: #eef4ff;
      padding: 14px;
      border-radius: 8px;
      overflow: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Browser Fetch Gemini OCR Demo</h1>
    <p>This page keeps the API key in memory only. It uses local browser Canvas to create a WebP image before calling Gemini.</p>

    <section class="panel grid">
      <div>
        <label for="apiKey">Gemini API Key</label>
        <input id="apiKey" type="password" autocomplete="off" placeholder="Paste key for this session">
      </div>
      <div>
        <label for="model">Model</label>
        <select id="model">
          <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
          <option value="gemini-3.5-flash">gemini-3.5-flash</option>
          <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
        </select>
      </div>
      <div>
        <label for="imageFile">A4 Image</label>
        <input id="imageFile" type="file" accept="image/*">
      </div>
      <div>
        <label for="longSide">Max Long Side</label>
        <select id="longSide">
          <option value="768">768 px trial</option>
          <option value="1280">1280 px balanced</option>
          <option value="1600">1600 px detail</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <label for="prompt">Prompt</label>
      <textarea id="prompt">Read this neutral A4 document and return only valid JSON. Do not use Markdown. Use empty strings for unclear fields and include review_flags.</textarea>
      <button id="runBtn" type="button">Optimize Image and Run Gemini</button>
    </section>

    <section class="panel">
      <h2>Status</h2>
      <pre id="status">Ready.</pre>
    </section>

    <section class="panel">
      <h2>Result</h2>
      <pre id="result"></pre>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error("canvas.toBlob failed")), type, quality);
      });
    }

    async function optimizeImage(file, maxLongSide) {
      const bitmap = await createImageBitmap(file);
      const longSide = Math.max(bitmap.width, bitmap.height);
      const scale = longSide > maxLongSide ? maxLongSide / longSide : 1;
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(bitmap.width * scale));
      canvas.height = Math.max(1, Math.round(bitmap.height * scale));
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
      if (typeof bitmap.close === "function") bitmap.close();
      const blob = await canvasToBlob(canvas, "image/webp", 0.85);
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(",")[1] || "");
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      return {
        base64,
        mimeType: "image/webp",
        width: canvas.width,
        height: canvas.height,
        size: blob.size,
        scale,
      };
    }

    async function runGemini() {
      const apiKey = $("apiKey").value.trim();
      const file = $("imageFile").files[0];
      const model = $("model").value;
      const prompt = $("prompt").value.trim();
      const maxLongSide = Number($("longSide").value || 768);
      if (!apiKey) throw new Error("Missing API key.");
      if (!file) throw new Error("Choose an image first.");

      $("status").textContent = "Optimizing image locally...";
      const image = await optimizeImage(file, maxLongSide);
      $("status").textContent = JSON.stringify({
        source: { name: file.name, type: file.type, size: file.size },
        sent: image,
      }, null, 2);

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-goog-api-key": apiKey,
        },
        body: JSON.stringify({
          contents: [{
            parts: [
              {
                inline_data: {
                  mime_type: image.mimeType,
                  data: image.base64,
                },
              },
              { text: prompt },
            ],
          }],
          generationConfig: {
            responseMimeType: "application/json",
            temperature: 0,
          },
        }),
      });

      const text = await response.text();
      if (!response.ok) throw new Error(text);
      $("result").textContent = text;
    }

    $("runBtn").addEventListener("click", () => {
      $("result").textContent = "";
      runGemini().catch((err) => {
        $("result").textContent = String(err.message || err);
      });
    });
  </script>
</body>
</html>
